<!DOCTYPE html>


<head>
	<meta charset="UTF-8">
	<title>作者的秘密</title>
</head>
<style>
	body {
		background-color: black;
		color: white;
		font-size: 20px;
		font-size: 30px;
		text-align: center;
	}
	dt {
		margin-bottom: 50px;
		text-align: center;
	}
	dl {
		justify-items: center;
		align-items: center;
		width: 100%;
		position: fixed;
		text-align: center;
	}
	button {
		background-color: rgb(0, 175, 233);
		width: 100px;
		height: 50px;
		font-size: 25px;
		border-radius: 10px;
	}
	button:hover {
		background-color: rgb(0, 74, 233);
		width: 100px;
		height: 50px;
		font-size: 25px;
	}
	.toast {
		background-color: red;
		border-radius: 10px;
		padding-top: 10px;
		padding-bottom: 10px;
		padding-left: 30px;
		padding-right: 30px;
		margin: 0 auto;
		width: 250px;
	}
</style>
<body>
	<div style="text-align: left;"><a href="https://eat11apple.github.io" style="margin-left: 20px;margin-top: 5px;text-decoration: none; color: white;;text-align: left;">&lt;返回主页</a></div>
	<div class="toast" id="toast">
		密码错误哦~宝宝
	</div>
	<dl>
		<dt><div style="font-size: 150%;">作者的秘密</div></dt>
		<dt>输入密码后方可查看</dt>
		<dt><input style="height: 40px; width: 500px;text-align: center;" placeholder="请输入密码" type="password"></dt>
		<dt><button style="margin-bottom: 0px;" onclick="showtoast()">确认</button></dt>
	</dl>
</body>

<script>
		const divElement2 = document.getElementById('toast');
		let hidetoasttimer = null
		let opacity = 0.0;
		let hidetoasttimer2 = null;
		function hidetoast() {
			let opacity = 1.0;
			hidetoasttimer2 = setInterval(() => {
				opacity -= 0.02;
				divElement2.style.opacity = opacity;
				if (opacity <= 0.0) {
					divElement2.style.visibility = 'hidden';
					clearInterval (hidetoasttimer2);
				}
			}, 5);
		};
		function showtoast() {
			divElement2.style.visibility = 'visible';
			divElement2.style.opacity = 0.0;
			let opacity = 0.0;
			clearTimeout (hidetoasttimer);
			clearTimeout (hidetoasttimer2);
			hidetoasttimer = setTimeout(() => {
				hidetoast ();
			}, 3000);
			hidetoasttimer2 = setInterval(() => {
				opacity += 0.02;
				divElement2.style.opacity = opacity;
				if (opacity >= 1.0) {
					clearInterval (hidetoasttimer2);
				}
			}, 5);
		};
		divElement2.style.visibility = 'hidden';
	</script>
